---
- name: "ipmi_exporter | Include pre requisite tasks"
  ansible.builtin.import_tasks:
    file: "pre_requisite.yml"
- name: "ipmi_exporter | Include IPMI kernel modules tasks"
  ansible.builtin.import_tasks:
    file: "kernel.yml"
  when:
    - "hostvars[inventory_hostname]['ipmi_exporter'] is defined"
    - "hostvars[inventory_hostname]['ipmi_exporter']
      not in ['', [], '[]', None]"
    - "hostvars[inventory_hostname]['ipmi_exporter_load_kernel_modules']
       | default(true) | bool"
- name: "ipmi_exporter | Include dependency installation tasks"
  ansible.builtin.import_tasks:
    file: "dependencies.yml"
  when:
    - "hostvars[inventory_hostname]['ipmi_exporter'] is defined"
    - "hostvars[inventory_hostname]['ipmi_exporter']
      not in ['', [], '[]', None]"
- name: "ipmi_exporter | Include packages tasks [package deployment]"
  ansible.builtin.include_tasks:
    file: "packages.yml"
  when:
    - "hostvars[inventory_hostname]['ipmi_exporter'] is defined"
    - "hostvars[inventory_hostname]['ipmi_exporter']
      not in ['', [], '[]', None]"
    - "hostvars[inventory_hostname]['ipmi_exporter'] |
       community.general.json_query(lookup('ansible.builtin.vars',
      'ipmi_exporter_install_package', default='')) == 'true'"
  vars:
    ipmi_exporter_install_package: "[] |
      map(&install_package || 'false', @) | [0]"
    ipmi_exporter_pacakges_variant:
      "{{ hostvars[inventory_hostname]['ipmi_exporter_package'] }}"
- name: "ipmi_exporter | Include packages tasks [not package deployment]"
  ansible.builtin.include_tasks:
    file: "download.yml"
  when:
    - "hostvars[inventory_hostname]['ipmi_exporter'] is defined"
    - "hostvars[inventory_hostname]['ipmi_exporter']
      not in ['', [], '[]', None]"
    - "hostvars[inventory_hostname]['ipmi_exporter'] |
       community.general.json_query(lookup('ansible.builtin.vars',
      'ipmi_exporter_install_package', default='')) == 'false'"
  vars:
    ipmi_exporter_install_package: "[] |
      map(&install_package || 'false', @) | [0]"
- name: "ipmi_exporter | Cleanup legacy workaround artifacts (sudoers, drop-ins, .yaml symlink)"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/sudoers.d/ipmi_exporter
    - /etc/systemd/system/ipmi_exporter.service.d/run-as-root.conf
    - /etc/systemd/system/ipmi_exporter.service.d/group-override.conf
    - /opt/ipmi_exporter/ipmi_exporter.yaml
  notify:
    - "Daemon reload"
    - "Restart ipmi_exporter"

- name: "ipmi_exporter | Include deployment tasks"
  ansible.builtin.import_tasks:
    file: "deploy.yml"
